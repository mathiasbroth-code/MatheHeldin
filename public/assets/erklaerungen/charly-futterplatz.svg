<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <!-- Wiese -->
  <rect width="320" height="320" fill="#f0fdf4" rx="16"/>

  <!-- Kreis (Seilreichweite 3m) -->
  <circle cx="160" cy="160" r="120" fill="#d1fae5" stroke="#10b981" stroke-width="2" stroke-dasharray="8 4" opacity="0.6"/>
  <text x="270" y="155" font-size="11" fill="#10b981" font-weight="bold">3 m</text>
  <line x1="160" y1="160" x2="280" y2="160" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Pfosten (Mittelpunkt) -->
  <circle cx="160" cy="160" r="8" fill="#78716c" stroke="#44403c" stroke-width="2"/>
  <text x="160" y="190" text-anchor="middle" font-size="11" fill="#44403c" font-weight="bold">Pfosten</text>

  <!-- Pflanze A: 2m (erreichbar) -->
  <text x="100" y="105" font-size="20" text-anchor="middle">🌿</text>
  <text x="100" y="120" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold">A (2 m)</text>

  <!-- Pflanze B: 3m (genau am Rand, erreichbar) -->
  <text x="240" y="85" font-size="20" text-anchor="middle">🌱</text>
  <text x="240" y="100" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold">B (3 m)</text>

  <!-- Pflanze C: 4m (nicht erreichbar) -->
  <text x="55" y="265" font-size="20" text-anchor="middle">🌻</text>
  <text x="55" y="280" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="bold">C (4 m)</text>

  <!-- Pflanze D: 1m (erreichbar) -->
  <text x="185" y="130" font-size="20" text-anchor="middle">🍀</text>
  <text x="185" y="145" text-anchor="middle" font-size="10" fill="#166534" font-weight="bold">D (1 m)</text>

  <!-- Pflanze E: 5m (nicht erreichbar) -->
  <text x="300" y="295" font-size="20" text-anchor="middle">🌾</text>
  <text x="300" y="310" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="bold">E (5 m)</text>

  <!-- Ziege Charly -->
  <text x="135" y="160" font-size="22" text-anchor="middle">🐐</text>
</svg>
