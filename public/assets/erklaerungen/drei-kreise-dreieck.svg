<svg xmlns="http://www.w3.org/2000/svg" viewBox="-130 -120 260 240" width="260" height="240">
  <!-- Drei Kreise mit gleichem Radius, Mittelpunkte auf gleichseitigem Dreieck -->
  <!-- Radius = 80, Mittelpunkte: oben, unten-links, unten-rechts -->
  <!-- M1=(0,-46.2), M2=(-40,23.1), M3=(40,23.1) bei Seitenlänge=80 -->

  <!-- Kreisflächen (halbtransparent) -->
  <circle cx="0" cy="-46.2" r="80" fill="#3B82F6" opacity="0.12" />
  <circle cx="-69.3" cy="40" r="80" fill="#EF4444" opacity="0.12" />
  <circle cx="69.3" cy="40" r="80" fill="#22C55E" opacity="0.12" />

  <!-- Kreislinien -->
  <circle cx="0" cy="-46.2" r="80" fill="none" stroke="#3B82F6" stroke-width="2" />
  <circle cx="-69.3" cy="40" r="80" fill="none" stroke="#EF4444" stroke-width="2" />
  <circle cx="69.3" cy="40" r="80" fill="none" stroke="#22C55E" stroke-width="2" />

  <!-- Gleichseitiges Dreieck (Verbindung der Mittelpunkte) -->
  <polygon points="0,-46.2 -69.3,40 69.3,40" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="2.5" stroke-dasharray="8,4" />

  <!-- Mittelpunkte -->
  <circle cx="0" cy="-46.2" r="5" fill="#3B82F6" />
  <circle cx="-69.3" cy="40" r="5" fill="#EF4444" />
  <circle cx="69.3" cy="40" r="5" fill="#22C55E" />

  <!-- Labels -->
  <text x="0" y="-58" text-anchor="middle" font-size="13" font-weight="bold" fill="#3B82F6" font-family="system-ui">M₁</text>
  <text x="-85" y="45" text-anchor="middle" font-size="13" font-weight="bold" fill="#EF4444" font-family="system-ui">M₂</text>
  <text x="85" y="45" text-anchor="middle" font-size="13" font-weight="bold" fill="#22C55E" font-family="system-ui">M₃</text>

  <!-- Seite "r" Label -->
  <text x="-42" y="-8" text-anchor="middle" font-size="12" font-style="italic" fill="#F59E0B" font-family="system-ui">r</text>
  <text x="42" y="-8" text-anchor="middle" font-size="12" font-style="italic" fill="#F59E0B" font-family="system-ui">r</text>
  <text x="0" y="52" text-anchor="middle" font-size="12" font-style="italic" fill="#F59E0B" font-family="system-ui">r</text>

  <!-- 60°-Winkelmarkierung am oberen Mittelpunkt -->
  <path d="M-11.5,-38 A15,15,0,0,1,11.5,-38" fill="none" stroke="#374151" stroke-width="1.2" />
  <text x="0" y="-28" text-anchor="middle" font-size="9" fill="#374151" font-family="system-ui">60°</text>
</svg>
