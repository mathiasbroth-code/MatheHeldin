<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- MatheHeldin Favicon — Mia vereinfacht für 32x32 -->

  <!-- Hintergrund -->
  <rect width="32" height="32" rx="6" fill="#0d9488"/>

  <!-- Ohren (vereinfacht) -->
  <polygon points="5,16 9,5 13,16" fill="#115e59"/>
  <polygon points="19,16 23,5 27,16" fill="#115e59"/>

  <!-- Innere Ohren -->
  <polygon points="7,15 9,7 11,15" fill="#5eead4"/>
  <polygon points="21,15 23,7 25,15" fill="#5eead4"/>

  <!-- Kopf -->
  <circle cx="16" cy="20" r="11" fill="#f0fdfa"/>

  <!-- Gesichtsfleck -->
  <ellipse cx="16" cy="23" rx="7" ry="6" fill="#ccfbf1"/>

  <!-- Augen -->
  <circle cx="12" cy="19" r="2" fill="#0f172a"/>
  <circle cx="20" cy="19" r="2" fill="#0f172a"/>

  <!-- Augenlicht -->
  <circle cx="12.7" cy="18.3" r="0.7" fill="#ffffff"/>
  <circle cx="20.7" cy="18.3" r="0.7" fill="#ffffff"/>

  <!-- Nase -->
  <ellipse cx="16" cy="22.5" rx="1.5" ry="1" fill="#0f172a"/>

  <!-- Lächeln -->
  <path d="M13,25 Q16,28 19,25" fill="none" stroke="#0f172a" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Stern (klein) -->
  <polygon points="16,13.5 16.7,15 18,15 17,16 17.3,17.3 16,16.5 14.7,17.3 15,16 14,15 15.3,15"
           fill="#fbbf24"/>
</svg>
