<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Accessoire: Fliege (Bowtie) am Hals -->
  <g transform="translate(60, 108)">
    <!-- Linke Schleife -->
    <polygon points="-18,-6 0,0 -18,6" fill="#ef4444"/>
    <polygon points="-16,-4 -2,0 -16,4" fill="#fca5a5" opacity="0.4"/>
    <!-- Rechte Schleife -->
    <polygon points="18,-6 0,0 18,6" fill="#ef4444"/>
    <polygon points="16,-4 2,0 16,4" fill="#fca5a5" opacity="0.4"/>
    <!-- Knoten -->
    <circle cx="0" cy="0" r="3.5" fill="#dc2626"/>
    <!-- Tupfen -->
    <circle cx="-10" cy="-1" r="1.2" fill="#fca5a5" opacity="0.5"/>
    <circle cx="-8" cy="2" r="1" fill="#fca5a5" opacity="0.4"/>
    <circle cx="10" cy="-1" r="1.2" fill="#fca5a5" opacity="0.5"/>
    <circle cx="8" cy="2" r="1" fill="#fca5a5" opacity="0.4"/>
  </g>
