<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Accessoire: Schleife (auf dem rechten Ohr) -->
  <g transform="translate(82, 18)">
    <!-- Linke Schleife -->
    <ellipse cx="-8" cy="0" rx="10" ry="6" fill="#f472b6" stroke="#ec4899" stroke-width="1" transform="rotate(-20)"/>
    <!-- Rechte Schleife -->
    <ellipse cx="8" cy="0" rx="10" ry="6" fill="#f472b6" stroke="#ec4899" stroke-width="1" transform="rotate(20)"/>
    <!-- Knoten -->
    <circle cx="0" cy="0" r="4" fill="#ec4899"/>
    <!-- Band-Enden -->
    <path d="M-2,4 L-5,14" stroke="#ec4899" stroke-width="2" stroke-linecap="round"/>
    <path d="M2,4 L5,14" stroke="#ec4899" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
