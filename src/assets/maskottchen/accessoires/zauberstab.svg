<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Accessoire: Zauberstab (rechts neben dem Kopf) -->
  <g transform="translate(100, 42) rotate(-30)">
    <!-- Stab -->
    <rect x="-2" y="0" width="4" height="36" rx="2" fill="#475569"/>
    <rect x="-2" y="28" width="4" height="8" rx="2" fill="#e2e8f0"/>
    <!-- Stern oben -->
    <polygon points="0,-12 2.5,-4 8,-4 3.5,0 5.5,7 0,3 -5.5,7 -3.5,0 -8,-4 -2.5,-4"
             fill="#fbbf24" stroke="#d97706" stroke-width="0.8"/>
    <!-- Sparkles -->
    <circle cx="8" cy="-8" r="1.5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="-6" cy="-10" r="1" fill="#fbbf24" opacity="0.5"/>
    <circle cx="4" cy="-16" r="1.2" fill="#fbbf24" opacity="0.6"/>
    <!-- Kleine Sterne -->
    <polygon points="-8,-4 -7,-2 -5,-2 -6.5,-0.5 -6,1.5 -8,0 -10,1.5 -9.5,-0.5 -11,-2 -9,-2"
             fill="#fcd34d" opacity="0.5" transform="scale(0.6)"/>
  </g>
</svg>
