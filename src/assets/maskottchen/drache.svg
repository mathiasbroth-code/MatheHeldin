<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Zap — kleiner Drache, cool aber freundlich -->

  <!-- Hörner/Zacken -->
  <polygon points="30,46 22,18 40,40" fill="#059669"/>
  <polygon points="50,38 44,12 56,34" fill="#059669"/>
  <polygon points="70,34 76,12 82,38" fill="#059669"/>
  <polygon points="90,40 98,18 92,46" fill="#059669"/>

  <!-- Innere Zacken -->
  <polygon points="33,44 26,24 38,40" fill="#6ee7b7"/>
  <polygon points="52,37 47,18 56,34" fill="#6ee7b7"/>
  <polygon points="72,34 76,18 80,37" fill="#6ee7b7"/>
  <polygon points="88,40 95,24 90,44" fill="#6ee7b7"/>

  <!-- Kopf (leicht breiter, kräftiger) -->
  <ellipse cx="60" cy="74" rx="42" ry="40" fill="#34d399"/>

  <!-- Schnauze (vorstehend) -->
  <ellipse cx="60" cy="86" rx="22" ry="16" fill="#a7f3d0"/>

  <!-- Augen (etwas schmaler, cooler Look) -->
  <ellipse cx="42" cy="65" rx="7" ry="6.5" fill="#0f172a"/>
  <ellipse cx="78" cy="65" rx="7" ry="6.5" fill="#0f172a"/>
  <!-- Pupillen (vertikal wie Reptil) -->
  <ellipse cx="42" cy="65" rx="3" ry="5.5" fill="#fbbf24"/>
  <ellipse cx="78" cy="65" rx="3" ry="5.5" fill="#fbbf24"/>
  <ellipse cx="42" cy="65" rx="1.2" ry="5" fill="#0f172a"/>
  <ellipse cx="78" cy="65" rx="1.2" ry="5" fill="#0f172a"/>
  <!-- Augenlicht -->
  <circle cx="44.5" cy="62.5" r="2" fill="#ffffff"/>
  <circle cx="80.5" cy="62.5" r="2" fill="#ffffff"/>

  <!-- Nüstern -->
  <circle cx="52" cy="82" r="2.5" fill="#059669"/>
  <circle cx="68" cy="82" r="2.5" fill="#059669"/>

  <!-- Lächeln (breiter, mit kleinem Zahn) -->
  <path d="M44,92 Q60,102 76,92" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Kleiner Drachenzahn -->
  <polygon points="70,92 73,97 76,92" fill="white" stroke="#cbd5e1" stroke-width="0.5"/>

  <!-- Kleine Flügel (angedeutet an den Seiten) -->
  <path d="M16,68 Q4,56 8,44 Q14,52 18,60" fill="#6ee7b7" stroke="#34d399" stroke-width="1.5"/>
  <path d="M104,68 Q116,56 112,44 Q106,52 102,60" fill="#6ee7b7" stroke="#34d399" stroke-width="1.5"/>

  <!-- Heldinnen-Stern -->
  <polygon points="60,42 62.5,48 69,48 63.5,52 65.5,58 60,54 54.5,58 56.5,52 51,48 57.5,48"
           fill="#fbbf24" opacity="0.9"/>
</svg>
