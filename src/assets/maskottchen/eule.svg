<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Hugo — Eule (Owl), rund und weise -->

  <!-- Federohren (Büschel) -->
  <polygon points="26,44 18,14 38,36" fill="#7c3aed"/>
  <polygon points="29,42 22,20 36,36" fill="#c4b5fd"/>
  <polygon points="94,44 102,14 82,36" fill="#7c3aed"/>
  <polygon points="91,42 98,20 84,36" fill="#c4b5fd"/>

  <!-- Körper (runder als der Fuchs) -->
  <ellipse cx="60" cy="74" rx="42" ry="44" fill="#a78bfa"/>

  <!-- Bauchfleck -->
  <ellipse cx="60" cy="84" rx="26" ry="28" fill="#ede9fe"/>

  <!-- Augenringe (typisch Eule) -->
  <circle cx="42" cy="65" r="14" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="78" cy="65" r="14" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>

  <!-- Augen -->
  <circle cx="42" cy="65" r="6.5" fill="#0f172a"/>
  <circle cx="78" cy="65" r="6.5" fill="#0f172a"/>
  <circle cx="44.5" cy="62.5" r="2.5" fill="#ffffff"/>
  <circle cx="80.5" cy="62.5" r="2.5" fill="#ffffff"/>

  <!-- Schnabel -->
  <polygon points="54,76 60,84 66,76" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>

  <!-- Flügel-Andeutung (seitlich) -->
  <path d="M18,72 Q12,85 20,100" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M102,72 Q108,85 100,100" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Füße -->
  <path d="M46,114 L42,118 M46,114 L46,119 M46,114 L50,118" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <path d="M74,114 L70,118 M74,114 L74,119 M74,114 L78,118" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>

  <!-- Heldinnen-Stern -->
  <polygon points="60,38 62.5,44 69,44 63.5,48 65.5,54 60,50 54.5,54 56.5,48 51,44 57.5,44"
           fill="#fbbf24" opacity="0.9"/>
</svg>
