<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Flocke — Hase, flauschig und freundlich -->

  <!-- Lange Ohren -->
  <ellipse cx="38" cy="24" rx="10" ry="28" fill="#38bdf8"/>
  <ellipse cx="38" cy="24" rx="6" ry="24" fill="#bae6fd"/>
  <ellipse cx="78" cy="20" rx="10" ry="28" fill="#38bdf8" transform="rotate(8, 78, 20)"/>
  <ellipse cx="78" cy="20" rx="6" ry="24" fill="#bae6fd" transform="rotate(8, 78, 20)"/>

  <!-- Kopf (rund und flauschig) -->
  <circle cx="60" cy="74" r="42" fill="#38bdf8"/>

  <!-- Wangen (flauschig) -->
  <circle cx="30" cy="78" r="14" fill="#7dd3fc"/>
  <circle cx="90" cy="78" r="14" fill="#7dd3fc"/>

  <!-- Gesichtsfleck -->
  <ellipse cx="60" cy="80" rx="24" ry="22" fill="#e0f2fe"/>

  <!-- Augen (groß und rund) -->
  <circle cx="42" cy="65" r="7.5" fill="#0f172a"/>
  <circle cx="78" cy="65" r="7.5" fill="#0f172a"/>
  <circle cx="44.5" cy="62" r="3" fill="#ffffff"/>
  <circle cx="80.5" cy="62" r="3" fill="#ffffff"/>
  <circle cx="43" cy="65" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="79" cy="65" r="1.2" fill="#ffffff" opacity="0.5"/>

  <!-- Nase (oval, rosa) -->
  <ellipse cx="60" cy="78" rx="4" ry="3" fill="#f9a8d4"/>

  <!-- Mund (Hasenmund: Y) -->
  <line x1="60" y1="81" x2="60" y2="86" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M53,88 Q60,84 67,88" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round"/>

  <!-- Hasenzähne -->
  <rect x="56" y="86" width="3.5" height="5" rx="1.5" fill="white" stroke="#cbd5e1" stroke-width="0.5"/>
  <rect x="60.5" y="86" width="3.5" height="5" rx="1.5" fill="white" stroke="#cbd5e1" stroke-width="0.5"/>

  <!-- Heldinnen-Stern -->
  <polygon points="60,42 62.5,48 69,48 63.5,52 65.5,58 60,54 54.5,58 56.5,52 51,48 57.5,48"
           fill="#fbbf24" opacity="0.9"/>
</svg>
