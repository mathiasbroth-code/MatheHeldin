<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Mia — encouraging/ermutigend (Zwinkern + Daumen hoch) -->

  <!-- Linkes Ohr -->
  <polygon points="18,52 38,12 58,52" fill="#0d9488"/>
  <polygon points="25,49 38,20 51,49" fill="#5eead4"/>

  <!-- Rechtes Ohr -->
  <polygon points="62,52 82,12 102,52" fill="#0d9488"/>
  <polygon points="69,49 82,20 95,49" fill="#5eead4"/>

  <!-- Kopf -->
  <circle cx="60" cy="72" r="44" fill="#14b8a6"/>

  <!-- Gesichtsfleck -->
  <ellipse cx="60" cy="82" rx="28" ry="24" fill="#99f6e4"/>

  <!-- Linkes Auge (Zwinkern) -->
  <path d="M35,65 Q42,59 49,65" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>

  <!-- Rechtes Auge (offen, freundlich) -->
  <circle cx="78" cy="65" r="6.5" fill="#0f172a"/>
  <circle cx="80.5" cy="62.5" r="2.5" fill="#ffffff"/>

  <!-- Nase -->
  <ellipse cx="60" cy="78" rx="5" ry="3.5" fill="#0f172a"/>

  <!-- Aufmunterndes Lächeln -->
  <path d="M46,85 Q60,97 74,85" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wangenröte (nur links, Zwinkerseite) -->
  <circle cx="34" cy="78" r="6" fill="#f0abfc" opacity="0.3"/>

  <!-- Heldinnen-Stern (Stirn) -->
  <polygon points="60,42 62.5,48 69,48 63.5,52 65.5,58 60,54 54.5,58 56.5,52 51,48 57.5,48"
           fill="#fbbf24" opacity="0.9"/>

  <!-- Daumen-hoch (rechts neben dem Kopf) -->
  <g transform="translate(100, 75)">
    <!-- Daumen -->
    <rect x="-4" y="-16" width="8" height="16" rx="4" fill="#14b8a6" stroke="#0d9488" stroke-width="1.5"/>
    <!-- Faust -->
    <rect x="-7" y="-2" width="14" height="10" rx="5" fill="#14b8a6" stroke="#0d9488" stroke-width="1.5"/>
  </g>
</svg>
