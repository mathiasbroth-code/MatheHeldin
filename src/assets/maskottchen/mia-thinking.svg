<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Mia — thinking/nachdenkend -->

  <!-- Linkes Ohr (leicht geneigt) -->
  <polygon points="18,52 38,12 58,52" fill="#0d9488"/>
  <polygon points="25,49 38,20 51,49" fill="#5eead4"/>

  <!-- Rechtes Ohr -->
  <polygon points="62,52 82,12 102,52" fill="#0d9488"/>
  <polygon points="69,49 82,20 95,49" fill="#5eead4"/>

  <!-- Kopf -->
  <circle cx="60" cy="72" r="44" fill="#14b8a6"/>

  <!-- Gesichtsfleck -->
  <ellipse cx="60" cy="82" rx="28" ry="24" fill="#99f6e4"/>

  <!-- Linkes Auge (normal) -->
  <circle cx="42" cy="65" r="6.5" fill="#0f172a"/>
  <circle cx="44.5" cy="62.5" r="2.5" fill="#ffffff"/>

  <!-- Rechtes Auge (nach oben schauend) -->
  <circle cx="78" cy="62" r="6.5" fill="#0f172a"/>
  <circle cx="80" cy="59.5" r="2.5" fill="#ffffff"/>

  <!-- Hochgezogene rechte Augenbraue -->
  <path d="M70,53 Q78,48 86,52" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Nase -->
  <ellipse cx="60" cy="78" rx="5" ry="3.5" fill="#0f172a"/>

  <!-- Nachdenklicher Mund (seitlich) -->
  <path d="M55,88 Q63,86 68,89" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Heldinnen-Stern (Stirn) -->
  <polygon points="60,42 62.5,48 69,48 63.5,52 65.5,58 60,54 54.5,58 56.5,52 51,48 57.5,48"
           fill="#fbbf24" opacity="0.9"/>

  <!-- Denkblasen -->
  <circle cx="105" cy="30" r="8" fill="#e2e8f0" opacity="0.7"/>
  <circle cx="96" cy="42" r="4.5" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="92" cy="50" r="2.5" fill="#e2e8f0" opacity="0.4"/>
</svg>
