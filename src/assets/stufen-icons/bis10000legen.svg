<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Zahlen bis 10000 legen: Zahl → Tausender bauen -->
  <!-- Zahl -->
  <text x="10" y="16" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="700" fill="#0d9488">2.500</text>
  <!-- Pfeil -->
  <path d="M20,12 L24,12" fill="none" stroke="#64748b" stroke-width="1.2" stroke-linecap="round"/>
  <polygon points="24,10 28,12 24,14" fill="#64748b"/>
  <!-- 2 Tausender-Würfel (vereinfacht) -->
  <rect x="30" y="6" width="10" height="10" rx="1" fill="#f59e0b" stroke="#78350f" stroke-width="0.8"/>
  <polygon points="30,6 34,2 44,2 40,6" fill="#fcd34d" stroke="#78350f" stroke-width="0.8"/>
  <polygon points="40,6 44,2 44,12 40,16" fill="#d97706" stroke="#78350f" stroke-width="0.8"/>

  <rect x="30" y="20" width="10" height="10" rx="1" fill="#f59e0b" stroke="#78350f" stroke-width="0.8"/>
  <polygon points="30,20 34,16 44,16 40,20" fill="#fcd34d" stroke="#78350f" stroke-width="0.8"/>
  <polygon points="40,20 44,16 44,26 40,30" fill="#d97706" stroke="#78350f" stroke-width="0.8"/>
  <!-- Hunderterplatte -->
  <rect x="30" y="34" width="8" height="8" rx="1" fill="#fbbf24" stroke="#92400e" stroke-width="0.8"/>
  <!-- Hand -->
  <path d="M10,24 L10,34 Q10,38 14,38 L18,38" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="10" cy="23" r="2" fill="#0d9488"/>
</svg>
