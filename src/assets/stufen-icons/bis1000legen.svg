<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Zahlen bis 1000 legen: Zahl → Hunderter bauen -->
  <!-- Zahl -->
  <text x="12" y="18" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0d9488">305</text>
  <!-- Pfeil -->
  <path d="M22,14 L26,14" fill="none" stroke="#64748b" stroke-width="1.2" stroke-linecap="round"/>
  <polygon points="26,12 30,14 26,16" fill="#64748b"/>
  <!-- 3 Hunderterplatten gestapelt -->
  <rect x="32" y="4" width="12" height="12" rx="1.5" fill="#fbbf24" stroke="#92400e" stroke-width="0.8"/>
  <rect x="34" y="6" width="12" height="12" rx="1.5" fill="#fbbf24" stroke="#92400e" stroke-width="0.8"/>
  <rect x="36" y="8" width="12" height="12" rx="1.5" fill="#fbbf24" stroke="#92400e" stroke-width="0.8"/>
  <!-- 5 Einer -->
  <rect x="32" y="24" width="4" height="4" rx="1" fill="#fde68a" stroke="#b45309" stroke-width="0.8"/>
  <rect x="38" y="24" width="4" height="4" rx="1" fill="#fde68a" stroke="#b45309" stroke-width="0.8"/>
  <rect x="44" y="24" width="4" height="4" rx="1" fill="#fde68a" stroke="#b45309" stroke-width="0.8"/>
  <rect x="32" y="30" width="4" height="4" rx="1" fill="#fde68a" stroke="#b45309" stroke-width="0.8"/>
  <rect x="38" y="30" width="4" height="4" rx="1" fill="#fde68a" stroke="#b45309" stroke-width="0.8"/>
  <!-- Hand-Symbol -->
  <path d="M10,24 L10,34 Q10,38 14,38 L18,38" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="10" cy="23" r="2" fill="#0d9488"/>
</svg>
