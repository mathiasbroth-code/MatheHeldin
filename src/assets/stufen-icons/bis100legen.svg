<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Zahlen bis 100 legen: Zahl → Blöcke -->
  <!-- Zahl -->
  <text x="10" y="24" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0d9488">45</text>
  <!-- Pfeil -->
  <path d="M20,20 L25,20" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="25,17 30,20 25,23" fill="#64748b"/>
  <!-- Zehnerstäbe -->
  <rect x="32" y="8" width="14" height="4" rx="1" fill="#fcd34d" stroke="#b45309" stroke-width="0.8"/>
  <rect x="32" y="14" width="14" height="4" rx="1" fill="#fcd34d" stroke="#b45309" stroke-width="0.8"/>
  <rect x="32" y="20" width="14" height="4" rx="1" fill="#fcd34d" stroke="#b45309" stroke-width="0.8"/>
  <rect x="32" y="26" width="14" height="4" rx="1" fill="#fcd34d" stroke="#b45309" stroke-width="0.8"/>
  <!-- Einer -->
  <rect x="32" y="33" width="4" height="4" rx="1" fill="#fde68a" stroke="#b45309" stroke-width="0.8"/>
  <rect x="38" y="33" width="4" height="4" rx="1" fill="#fde68a" stroke="#b45309" stroke-width="0.8"/>
  <rect x="32" y="39" width="4" height="4" rx="1" fill="#fde68a" stroke="#b45309" stroke-width="0.8"/>
  <rect x="38" y="39" width="4" height="4" rx="1" fill="#fde68a" stroke="#b45309" stroke-width="0.8"/>
  <rect x="44" y="33" width="4" height="4" rx="1" fill="#fde68a" stroke="#b45309" stroke-width="0.8"/>
  <!-- Hand/Finger-Symbol (legen) -->
  <path d="M8,30 L8,38 Q8,42 12,42 L16,42" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="8" cy="29" r="2" fill="#0d9488"/>
</svg>
