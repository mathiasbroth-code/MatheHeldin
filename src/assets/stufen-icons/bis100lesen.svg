<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Zahlen bis 100 lesen: Blöcke → Zahl -->
  <!-- Zehnerstab -->
  <rect x="4" y="10" width="20" height="5" rx="1.5" fill="#fcd34d" stroke="#b45309" stroke-width="1"/>
  <rect x="4" y="17" width="20" height="5" rx="1.5" fill="#fcd34d" stroke="#b45309" stroke-width="1"/>
  <!-- 3 Einer -->
  <rect x="4" y="25" width="5" height="5" rx="1" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
  <rect x="11" y="25" width="5" height="5" rx="1" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
  <rect x="18" y="25" width="5" height="5" rx="1" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
  <!-- Pfeil -->
  <path d="M28,20 L33,20" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="33,17 38,20 33,23" fill="#64748b"/>
  <!-- Zahl -->
  <text x="42" y="24" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0d9488">23</text>
  <!-- Auge (lesen = sehen) -->
  <ellipse cx="42" cy="36" rx="5" ry="3.5" fill="none" stroke="#0d9488" stroke-width="1.2"/>
  <circle cx="42" cy="36" r="1.5" fill="#0d9488"/>
</svg>
