<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Zehner bündeln: 10er-Gruppen erkennen -->
  <!-- Ein Zehnerstab -->
  <rect x="4" y="6" width="40" height="8" rx="2" fill="#fcd34d" stroke="#b45309" stroke-width="1.2"/>
  <!-- Trennlinien im Zehnerstab -->
  <line x1="8" y1="6" x2="8" y2="14" stroke="#b45309" stroke-width="0.6"/>
  <line x1="12" y1="6" x2="12" y2="14" stroke="#b45309" stroke-width="0.6"/>
  <line x1="16" y1="6" x2="16" y2="14" stroke="#b45309" stroke-width="0.6"/>
  <line x1="20" y1="6" x2="20" y2="14" stroke="#b45309" stroke-width="0.6"/>
  <line x1="24" y1="6" x2="24" y2="14" stroke="#b45309" stroke-width="0.6"/>
  <line x1="28" y1="6" x2="28" y2="14" stroke="#b45309" stroke-width="0.6"/>
  <line x1="32" y1="6" x2="32" y2="14" stroke="#b45309" stroke-width="0.6"/>
  <line x1="36" y1="6" x2="36" y2="14" stroke="#b45309" stroke-width="0.6"/>
  <line x1="40" y1="6" x2="40" y2="14" stroke="#b45309" stroke-width="0.6"/>
  <!-- Geschweifte Klammer darunter (vereinfacht als Pfeil) -->
  <path d="M4,18 L24,24 L44,18" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 10 -->
  <text x="24" y="34" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#0d9488">10</text>
  <!-- Plus 3 Einer darunter -->
  <rect x="10" y="38" width="6" height="6" rx="1.5" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
  <rect x="19" y="38" width="6" height="6" rx="1.5" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
  <rect x="28" y="38" width="6" height="6" rx="1.5" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
</svg>
