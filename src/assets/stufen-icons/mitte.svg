<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Zahl in der Mitte: Mittelwert auf Zahlenstrahl -->
  <!-- Zahlenstrahl -->
  <line x1="4" y1="24" x2="44" y2="24" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
  <!-- Tick-Marks -->
  <line x1="8" y1="20" x2="8" y2="28" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="24" y1="18" x2="24" y2="30" stroke="#0d9488" stroke-width="2"/>
  <line x1="40" y1="20" x2="40" y2="28" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Beschriftungen -->
  <text x="8" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600" fill="#64748b">20</text>
  <text x="40" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600" fill="#64748b">40</text>
  <!-- Mitte-Marker (Diamant) -->
  <polygon points="24,14 28,18 24,22 20,18" fill="#0d9488"/>
  <!-- Fragezeichen -->
  <text x="24" y="44" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#0d9488">?</text>
  <!-- Verbindungspfeile -->
  <path d="M10,12 L22,12" fill="none" stroke="#14b8a6" stroke-width="1" stroke-dasharray="2,2"/>
  <path d="M26,12 L38,12" fill="none" stroke="#14b8a6" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="16" y="10" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="5" fill="#14b8a6">gleich</text>
  <text x="32" y="10" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="5" fill="#14b8a6">gleich</text>
</svg>
