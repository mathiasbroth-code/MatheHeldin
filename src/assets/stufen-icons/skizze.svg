<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Sachaufgaben mit Skizze: 3-Phasen-Flow -->
  <!-- Strecken-Linie (Zahlenstrahl-artig) -->
  <line x1="6" y1="20" x2="42" y2="20" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
  <!-- Orte als Punkte -->
  <circle cx="6" cy="20" r="3" fill="#0d9488"/>
  <circle cx="20" cy="20" r="3" fill="#0d9488"/>
  <circle cx="36" cy="20" r="3" fill="#0d9488"/>
  <!-- Strecken-Beschriftung -->
  <text x="13" y="16" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="6" font-weight="600" fill="#64748b">3,2 km</text>
  <text x="28" y="16" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="6" font-weight="700" fill="#0d9488">? km</text>
  <!-- Ort-Labels -->
  <text x="6" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="5" fill="#475569">Start</text>
  <text x="20" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="5" fill="#475569">See</text>
  <text x="36" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="5" fill="#475569">Ziel</text>
  <!-- Bleistift -->
  <g transform="translate(34,34) rotate(-45)">
    <rect x="0" y="0" width="4" height="14" rx="0.5" fill="#fbbf24" stroke="#92400e" stroke-width="0.8"/>
    <polygon points="0,14 2,18 4,14" fill="#0f172a"/>
    <rect x="0" y="0" width="4" height="3" rx="0.5" fill="#f0abfc" opacity="0.5"/>
  </g>
</svg>
